<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
<div class="container">
    <h2 class="extension-title">FORECAST</h2>

    <div class="tabs">
        <button class="tab-button active" data-tab="general">General</button>
        <button class="tab-button" data-tab="features">Features</button>
        <button class="tab-button" data-tab="about">About</button>
    </div>

    <div id="general" class="settings-category active-category">
        <div class="setting-item">
            <label for="toggleExtension">Status</label>
            <label class="switch">
                <input type="checkbox" id="toggleExtension">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="features" class="settings-category">
        <div class="setting-item">
            <label>Advanced Match History</label>
            <label class="switch">
                <input type="checkbox" id="matchhistory">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <label>New Elo Rankings</label>
            <label class="switch">
                <input type="checkbox" id="eloranking">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item">
            <label>Extended in-match info</label>
            <label class="switch">
                <input type="checkbox" id="matchroom">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-item slider-container">
            <span class="limit-label">Match Limit</span>
            <input type="range" id="rangeSlider" class="range-slider" min="5" max="100" value="20">
            <span id="sliderValue">20</span>
        </div>
    </div>

    <div id="about" class="settings-category">
        <div class="setting-item">
            <label>Version</label><label id="version"></label>
        </div>
        <div class="setting-item">
            <label>Author</label><label id="author"></label>
        </div>
        <div class="setting-item">
            <label>Email</label>
            <span>
                <button id="copyButton">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="width: 26px; height: auto;">
                        <path fill="#4caf50" d="M45,16.2l-5,2.75l-5,4.75L35,40h7c1.657,0,3-1.343,3-3V16.2z"/><path
                            fill="#1e88e5" d="M3,16.2l3.614,1.71L13,23.7V40H6c-1.657,0-3-1.343-3-3V16.2z"/><polygon
                            fill="#e53935" points="35,11.2 24,19.45 13,11.2 12,17 13,23.7 24,31.95 35,23.7 36,17"/><path
                            fill="#c62828"
                            d="M3,12.298V16.2l10,7.5V11.2L9.876,8.859C9.132,8.301,8.228,8,7.298,8h0C4.924,8,3,9.924,3,12.298z"/><path
                            fill="#fbc02d"
                            d="M45,12.298V16.2l-10,7.5V11.2l3.124-2.341C38.868,8.301,39.772,8,40.702,8h0 C43.076,8,45,9.924,45,12.298z"/>
                    </svg>
                </button>
                <div id="notification" class="notification">Copied!</div>
            </span>
        </div>
        <div class="setting-item">
            <label>GitHub</label>
            <span>
                <a href="https://github.com/TerraMiner/Forecast" target="_blank">
                    <svg viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg" style="width: 26px; height: auto;">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                              d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"
                              fill="#fff"/>
                    </svg>
                </a>
            </span>
        </div>
    </div>
</div>
</body>
</html>
